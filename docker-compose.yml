services:
  nginx:
    build: ./nginx
    image: ghcr.io/manuxio/nginx-migration-manager/nginx:${IMAGE_TAG:-latest}
    container_name: nginx-managed-proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      - CERT_CN=${CERT_CN:-localhost}
    volumes:
      # Whole nginx config on the host. Empty on first boot -> the container seeds it from
      # the image's baked-in defaults (see nginx/entrypoint.sh). Edit files here directly.
      - ./data/nginx:/etc/nginx
    networks:
      - nginxnet

  app:
    build: ./app
    image: ghcr.io/manuxio/nginx-migration-manager/app:${IMAGE_TAG:-latest}
    container_name: nginx-managed-app
    restart: unless-stopped
    # Admin UI. Protected by basic auth + assumed to be on a trusted network.
    # Host port via APP_PORT (default 3000); container always listens on 3000.
    # To restrict to this host only, set it to e.g. "127.0.0.1:${APP_PORT:-3000}:3000".
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - SITES_DIR=/etc/nginx/sites
      - DATA_DIR=/data
      - BASIC_AUTH_USER=${BASIC_AUTH_USER:-admin}
      - BASIC_AUTH_PASS=${BASIC_AUTH_PASS:-changeme}
    volumes:
      - ./data/nginx/sites:/etc/nginx/sites   # same host folder as nginx (host configs + git)
      - ./data/app:/data                       # manifest, backups
    networks:
      - nginxnet

networks:
  nginxnet:
