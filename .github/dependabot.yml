version: 2
updates:
  # --- application dependencies (npm) ---
  - package-ecosystem: npm
    directory: /app/server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      server-deps:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /app/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      web-deps:
        patterns: ['*']

  # --- base images (Docker) ---
  - package-ecosystem: docker
    directory: /nginx
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /app
    schedule:
      interval: weekly

  # --- GitHub Actions versions ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
