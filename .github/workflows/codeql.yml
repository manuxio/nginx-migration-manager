name: CodeQL

# Static analysis of the JS/TS in app/ (server + web). Results land in the repo's
# Security > Code scanning tab. Free on this public repo.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1'   # weekly, Monday 03:27 UTC — catches newly-published query updates
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload results to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none          # interpreted code — no compilation needed
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
