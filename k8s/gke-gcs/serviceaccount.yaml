# Kubernetes SA linked to a GCP service account via Workload Identity, so the pod can
# access the GCS bucket without keys. Replace PROJECT_ID (see k8s/gke-gcs/README.md).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nginx-managed
  annotations:
    iam.gke.io/gcp-service-account: nginx-managed@PROJECT_ID.iam.gserviceaccount.com
