# Static nginx config (HTTP-only). The dynamic per-host files live on the PVC at
# /etc/nginx/sites; this ConfigMap supplies the base config + the shared proxy snippet.
# Note: mounted via subPath, so changes need `kubectl rollout restart deploy/nginx-managed`.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-managed-config
data:
  nginx.conf: |
    user  nginx;
    worker_processes auto;
    pid /var/run/nginx.pid;

    events { worker_connections 1024; }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        server_tokens off;
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        client_header_timeout 15s;
        client_body_timeout   15s;
        send_timeout          15s;
        keepalive_timeout     65s;
        client_max_body_size  16m;

        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log warn;
        gzip on;

        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        # serve /etc/nginx/error.html when an upstream is down (502/503/504). The serving
        # location lives in snippets/upstream-error.conf, included per host at server scope.
        proxy_intercept_errors on;
        error_page 502 503 504 /__upstream_down.html;

        # default: reject unknown Host (HTTP/80 only) + LB health check responder
        server {
            listen 80 default_server;
            server_name _;
            location = /healthz { access_log off; return 200 "ok\n"; }
            location / {
                if ($http_user_agent ~ "GoogleHC") { return 200 "ok\n"; }
                return 444;
            }
        }

        include /etc/nginx/sites/*.conf;
    }
  proxy.conf: |
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_ssl_server_name on;
    proxy_ssl_name        $host;
    client_max_body_size  0;
    proxy_connect_timeout 30s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;
    proxy_buffering off;
