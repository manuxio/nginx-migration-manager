# nginx-migration-manager on GKE — BUCKET (gcsfuse) version, NO subPath.
#
# Why no subPath: the kubelet creates subPath dirs with mkdir on the volume, which gcsfuse
# (object storage) rejects -> "failed to create subPath directory". So both containers mount
# the WHOLE PVC at /etc/nginx, and everything lives under it:
#   /etc/nginx              -> the bucket root (nginx.conf, snippets/, mime.types, …)
#   /etc/nginx/sites        -> host .conf files + git history   (SITES_DIR)
#   /etc/nginx/appdata      -> manifest, served-commit, backups (DATA_DIR)
#
# Why the initContainer: the image's entrypoint seeds with `cp -a`, and -a preserves
# ownership/timestamps which gcsfuse refuses (kills the container under `set -e`). The
# initContainer seeds with `cp -r` (no attr preserve) so nginx.conf is already present and the
# entrypoint's own seed is skipped. App-level mkdir works on gcsfuse; only kubelet subPath fails.
#
# Requires: demo-gke-shared-pvc's PV must mount with `implicit-dirs` (and a LOW metadata-cache TTL
# so the nginx watcher sees the app's writes). Expect slower git on object storage — fine here.
---
apiVersion: v1
kind: Secret
metadata:
  name: nginx-managed-auth
type: Opaque
stringData:
  user: coni
  pass: CHANGE-ME              # <-- set a real password before applying (don't commit it)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-managed
  labels: { app: nginx-managed }
spec:
  replicas: 1                  # single-writer design — do not scale
  strategy: { type: Recreate } # RWO; no rolling update
  selector:
    matchLabels: { app: nginx-managed }
  template:
    metadata:
      labels: { app: nginx-managed }
      annotations:
        gke-gcsfuse/volumes: "true"          # inject the gcsfuse sidecar
        gke-gcsfuse/cpu-limit: "250m"
        gke-gcsfuse/memory-limit: 256Mi
    spec:
      initContainers:
        # gcsfuse-safe seed: populate /etc/nginx on the bucket WITHOUT cp -a (no chown/utimes,
        # which gcsfuse rejects). Runs once; skipped when nginx.conf already exists.
        - name: seed
          image: eu.gcr.io/n-gke-eps-prod/nginx:sha-5e84bf0
          command: ["sh", "-c"]
          args:
            - |
              set -e
              DEF=/usr/local/share/nginx-defaults
              if [ ! -f /etc/nginx/nginx.conf ]; then
                echo "[seed] populating /etc/nginx on the bucket (gcsfuse-safe copy) ..."
                cp -r "$DEF"/. /etc/nginx/
              fi
              mkdir -p /etc/nginx/sites /etc/nginx/snippets
              # restore newer shipped files on an already-seeded bucket (never overwrites edits)
              [ -e /etc/nginx/error.html ] || cp "$DEF/error.html" /etc/nginx/error.html
              [ -e /etc/nginx/snippets/upstream-error.conf ] || cp "$DEF/snippets/upstream-error.conf" /etc/nginx/snippets/upstream-error.conf
              echo "[seed] done"
          volumeMounts:
            - { name: data, mountPath: /etc/nginx }

      containers:
        - name: nginx
          image: eu.gcr.io/n-gke-eps-prod/nginx:sha-5e84bf0
          ports:
            - { name: http, containerPort: 80 }
          volumeMounts:
            # whole bucket; nginx.conf already seeded by initContainer -> entrypoint seed skips
            - { name: data, mountPath: /etc/nginx }
          readinessProbe: { tcpSocket: { port: http }, initialDelaySeconds: 5 }
          livenessProbe:  { tcpSocket: { port: http }, initialDelaySeconds: 15 }

        - name: app
          image: eu.gcr.io/n-gke-eps-prod/app:sha-5e84bf0
          ports:
            - { name: admin, containerPort: 3000 }
          env:
            - { name: SITES_DIR, value: /etc/nginx/sites }
            - { name: DATA_DIR,  value: /etc/nginx/appdata }   # app data on the bucket too
            - name: BASIC_AUTH_USER
              valueFrom: { secretKeyRef: { name: nginx-managed-auth, key: user } }
            - name: BASIC_AUTH_PASS
              valueFrom: { secretKeyRef: { name: nginx-managed-auth, key: pass } }
          volumeMounts:
            # same whole-bucket mount; app creates sites/ and appdata/ via mkdir (works on gcsfuse)
            - { name: data, mountPath: /etc/nginx }
          readinessProbe: { tcpSocket: { port: admin }, initialDelaySeconds: 5 }

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: demo-gke-shared-pvc      # your gcsfuse-backed PVC
---
# Proxy (HTTP/80) — GKE provisions a network Load Balancer.
apiVersion: v1
kind: Service
metadata:
  name: nginx-managed-proxy
spec:
  type: LoadBalancer
  selector: { app: nginx-managed }
  ports:
    - { name: http, port: 80, targetPort: http }
---
# Admin UI (3000) — internal only:  kubectl port-forward svc/nginx-managed-admin 3000:3000
apiVersion: v1
kind: Service
metadata:
  name: nginx-managed-admin
spec:
  type: ClusterIP
  selector: { app: nginx-managed }
  ports:
    - { name: admin, port: 3000, targetPort: admin }
