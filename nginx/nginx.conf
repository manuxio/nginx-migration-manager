user  nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # room for many / long server_name entries (raise max_size too if you pass ~512 hosts)
    server_names_hash_bucket_size 180;

    # ---------------------------------------------------------------- hardening
    server_tokens off;                 # don't leak nginx version
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # slowloris / resource limits (per-host proxy snippet relaxes proxy_* timeouts)
    client_header_timeout 15s;
    client_body_timeout   15s;
    send_timeout          15s;  
    keepalive_timeout     65s;
    client_max_body_size  16m;         # global default; hosts override to unlimited

    # ------------------------------------------------------------------ logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" host=$host';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # websocket upgrade helper used by snippets/proxy.conf
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --------------------------------------- custom page when an upstream is down
    # If a backend can't be reached (nginx-generated 502/504) or returns 502/503/504,
    # serve the static /etc/nginx/error.html instead of nginx's default error page.
    # The serving location is in snippets/upstream-error.conf, which every generated
    # host includes at server level (error_page resolves per-server, so it must be
    # present in each proxying server).
    proxy_intercept_errors on;
    error_page 502 503 504 /__upstream_down.html;

    # ------------------------------------------- default: reject unknown Host (444)
    # HTTP only (port 80). Only domains with an explicit host file below are served.
    server {
        listen 80 default_server;
        server_name _;

        # Load-balancer health checks: GKE/GCP probes with User-Agent "GoogleHC/1.0".
        # Answer 200 so the backend is marked healthy. Point the LB health check at
        # /healthz; the User-Agent match also covers checks that probe "/".
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }
        location / {
            if ($http_user_agent ~ "GoogleHC") { return 200 "ok\n"; }
            return 444;                     # real unknown-Host traffic still rejected
        }
    }

    # ----------------------------------------- internal metrics (never published)
    # stub_status on 0.0.0.0:8080 so it's reachable both ways: same-pod loopback in k8s
    # AND by the "nginx" service name in docker-compose. It is NOT in any Service / not
    # in compose `ports:`, so it stays on the internal network. The app scrapes it on the
    # correct host for its topology and re-exposes counts via /api/metrics.
    # (Note: in k8s this is pod-IP reachable by other pods; add a NetworkPolicy to lock
    #  it to the app if you need the strict loopback-only guarantee back.)
    server {
        listen 8080;
        location = /stub_status {
            stub_status;
            access_log off;
        }
        location / { return 404; }
    }

    # ------------------------------------------------ generated reverse-proxy hosts
    include /etc/nginx/sites/*.conf;
}
