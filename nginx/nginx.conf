user  nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------- hardening
    server_tokens off;                 # don't leak nginx version
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # slowloris / resource limits (per-host proxy snippet relaxes proxy_* timeouts)
    client_header_timeout 15s;
    client_body_timeout   15s;
    send_timeout          15s;
    keepalive_timeout     65s;
    client_max_body_size  16m;         # global default; hosts override to unlimited

    # ------------------------------------------------------------------ logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" host=$host';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # websocket upgrade helper used by snippets/proxy.conf
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -------------------------------------------------------- shared TLS (one cert)
    # ssl_certificate is valid in http context and inherited by every server{}.
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    include /etc/nginx/snippets/ssl.conf;

    # ------------------------------------------- default: reject unknown Host (444)
    # Only domains with an explicit host file below are served.
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
    server {
        listen 443 ssl default_server;
        http2 on;
        server_name _;
        return 444;
    }

    # ------------------------------------------------ generated reverse-proxy hosts
    include /etc/nginx/sites/*.conf;
}
