# Serves the static upstream-down page. Referenced by the http-level directive in
# nginx.conf:  error_page 502 503 504 /__upstream_down.html;
#
# error_page does an internal redirect resolved WITHIN the current server, and nginx has
# no global location — so this serving location must exist in every proxying server.
# Each generated host includes this snippet at server level; without it the error URI
# falls back into "location /" -> the (down) proxy_pass -> loop -> nginx's default 502.
location = /__upstream_down.html {
    internal;                       # only reachable via the error_page redirect
    alias /etc/nginx/error.html;    # the editable static page
}
