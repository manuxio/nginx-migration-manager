# Permissive reverse-proxy params — included by every generated host's location{}.
proxy_http_version 1.1;

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

# websockets / SSE
proxy_set_header Upgrade    $http_upgrade;
proxy_set_header Connection $connection_upgrade;

# HTTPS upstreams (proxy_pass https://… for :443 backends): send SNI = the request host so
# virtual-hosted TLS backends serve the right cert. (No effect on http:// upstreams.)
proxy_ssl_server_name on;
proxy_ssl_name        $host;

# permissive on purpose: big uploads, slow upstreams, streaming
client_max_body_size 0;            # no upload size limit per host
proxy_read_timeout   600s;
proxy_send_timeout   600s;
proxy_connect_timeout 30s;
proxy_buffering off;
