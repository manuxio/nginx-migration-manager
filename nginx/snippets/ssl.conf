# TLS hardening — shared by all servers (included at http level).
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
ssl_prefer_server_ciphers off;     # let clients pick (best for TLS 1.3)
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# HSTS is intentionally OFF: with a self-signed cert it would permanently
# lock browsers out. Enable ONLY once you switch to a CA-signed certificate:
# add_header Strict-Transport-Security "max-age=63072000" always;
